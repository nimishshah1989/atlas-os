# Copy to <project-root>/.pre-commit-config.yaml in every product repo.
# Then run once:  pre-commit install
#
# Local enforcement: catches issues before push. Composes with Claude Code hooks
# (which run during the session) and CI (which runs after push).
#
# Pinned versions to prevent silent rule drift across releases.

repos:
  # Standard hygiene pack — the "auto-clean junk on commit" layer. Self-contained
  # (no global deps), so this is the portable core every repo should carry.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-merge-conflict          # blocks committing a half-resolved merge
      - id: check-case-conflict           # blocks names that collide on case-insensitive FS
      - id: check-added-large-files       # blocks a stray big blob sneaking in
        args: [--maxkb=1024]
      - id: check-yaml
      - id: check-json
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking is pyright (the project + global standard: pyproject has
  # [tool.pyright], `make typecheck` runs it, global CLAUDE.md mandates it).
  # mypy was removed 2026-05-31 to end a two-checker split — it lived only here,
  # was never in the dev extra, and used a different config. pyright is enforced
  # by `make check` locally and by the ratchet gate in CI (see
  # .github/workflows/ci.yml + scripts/ci/pyright_ratchet.py).

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  # Local hook: pragma-coverage gate.
  # Requires the global gates installed at ~/.claude/gates/.
  # entry uses bash -c so $HOME expands at run time (pre-commit does not
  # do shell expansion of ~ or $VAR in entry strings).
  #
  # files: \.py$  — this gate runs the Python test suite; a frontend-only
  # (TypeScript) commit must NOT trigger it. Without this filter every
  # commit, including pure-frontend ones, ran pytest and blocked on it.
  - repo: local
    hooks:
      - id: pragma-coverage
        name: pragma finance-critical coverage (100%)
        # Graceful-skip if the global gate isn't installed on this machine, so
        # `pre-commit install` never breaks commits in an env without ~/.claude/gates.
        # CI still enforces this (scripts/ci/gate_pragma_coverage.sh) — the source of truth.
        entry: bash -c 'g=$HOME/.claude/gates/gate-pragma-coverage.sh; [ -x "$g" ] && exec "$g" || { echo "skip pragma-coverage (gate not installed; CI enforces)"; exit 0; }'
        language: system
        pass_filenames: false
        files: \.py$
        stages: [pre-commit]

  # Local hook: decisions.jsonl chain integrity (FIX #5).
  # Only relevant when decisions.jsonl itself is part of the commit.
  - repo: local
    hooks:
      - id: verify-decisions-chain
        name: decisions.jsonl SHA-256 chain integrity
        entry: bash -c 'h=$HOME/.claude/hooks/lib/verify-chain.sh; [ -x "$h" ] && exec "$h" || exit 0'
        language: system
        pass_filenames: false
        files: ^decisions\.jsonl$
        stages: [pre-commit]

  # Modulith discipline: enforce architectural rules.
  - repo: local
    hooks:
      - id: file-size-limit
        name: file size limit (tiered LOC limits)
        entry: python3 scripts/hooks/check_file_size.py
        language: system
        pass_filenames: false
        files: \.(py|tsx?|jsx?)$
        stages: [pre-commit]

      # module-boundaries + no-magic-thresholds inspect Python imports /
      # Python source — scope to .py so frontend commits skip them.
      - id: module-boundaries
        name: bounded-context import boundaries
        entry: python3 scripts/hooks/check_module_boundaries.py
        language: system
        pass_filenames: false
        files: \.py$
        stages: [pre-commit]

      - id: no-magic-thresholds
        name: thresholds live in atlas_thresholds, not in code
        entry: python3 scripts/hooks/check_no_magic_thresholds.py
        language: system
        pass_filenames: false
        files: \.py$
        stages: [pre-commit]
