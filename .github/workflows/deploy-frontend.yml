name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync source to EC2
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az --delete --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='standalone' --exclude='.env*'
          path: frontend/
          remote_path: /home/ubuntu/atlas-frontend/
          remote_host: ${{ secrets.EC2_HOST }}
          remote_user: ubuntu
          remote_key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Build and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/atlas-frontend

            echo "--- writing env ---"
            # SP04 Stage 4a/4c: ATLAS_INTERNAL_SECRET is required by the
            # /api/admin/proposals/* and /api/admin/weight-performance Next.js
            # proxy routes so the approve/reject/snooze buttons can reach the
            # FastAPI on the compute EC2. Add the secret in GitHub repo
            # Settings → Secrets and variables → Actions. Same value as
            # /etc/systemd/system/atlas-internal-recompute.service.d/secret.conf
            # on the compute host.
            printf '%s\n%s\n%s\n' \
              'ATLAS_DB_URL=${{ secrets.ATLAS_DB_URL }}' \
              'ATLAS_INTERNAL_API_BASE_URL=${{ secrets.ATLAS_INTERNAL_API_BASE_URL }}' \
              'ATLAS_INTERNAL_SECRET=${{ secrets.ATLAS_INTERNAL_SECRET }}' \
              > .env.local

            echo "--- installing deps ---"
            npm ci

            echo "--- building (PM2 keeps serving old version during build) ---"
            rm -rf .next
            npm run build

            echo "--- restarting service (only reached if build succeeded) ---"
            sudo systemctl restart atlas-frontend

            echo "--- verifying ---"
            sleep 5
            systemctl is-active atlas-frontend
            curl -sf http://localhost:3001/ > /dev/null && echo "✓ site is up" || (echo "✗ site not responding" && exit 1)
