name: Deploy Frontend

# Trigger only on frontend/migrations/scripts changes touching the deploy surface.
# Other commits (docs, infra/, atlas/) don't redeploy.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build, deploy + auto-rollback on EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Rsync WITHOUT --delete so legacy / sibling files in the deploy target
      # are never wiped. We learned this the hard way 2026-05-28: --delete
      # removed v6 routes (calls/, etfs/, india-pulse/, ...) that existed only
      # on the deploy target, and the site 404'd in production.
      - name: Sync frontend source to EC2 (additive only)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='standalone' --exclude='.env*'
          path: frontend/
          remote_path: /home/ubuntu/atlas-frontend-v2/frontend/
          remote_host: ${{ secrets.EC2_HOST }}
          remote_user: ubuntu
          remote_key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Build, pm2 reload + auto-rollback if health-check fails
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/atlas-frontend-v2

            STAMP=$(date +%Y%m%d_%H%M%S)
            LOG="/home/ubuntu/logs/deploy_${STAMP}.log"
            mkdir -p /home/ubuntu/logs

            echo "[deploy ${STAMP}] writing .env.local" | tee -a "$LOG"
            printf '%s\n%s\n%s\n' \
              'ATLAS_DB_URL=${{ secrets.ATLAS_DB_URL }}' \
              'ATLAS_INTERNAL_API_BASE_URL=${{ secrets.ATLAS_INTERNAL_API_BASE_URL }}' \
              'ATLAS_INTERNAL_SECRET=${{ secrets.ATLAS_INTERNAL_SECRET }}' \
              > .env.local

            echo "[deploy ${STAMP}] backing up current .next → .next.bak.${STAMP}" | tee -a "$LOG"
            if [ -d .next ]; then
              cp -r .next .next.bak.${STAMP}
            fi

            echo "[deploy ${STAMP}] npm ci" | tee -a "$LOG"
            npm ci --prefer-offline >> "$LOG" 2>&1

            echo "[deploy ${STAMP}] building (PM2 still serves the OLD build)" | tee -a "$LOG"
            if NODE_OPTIONS="--max-old-space-size=3072" npm run build >> "$LOG" 2>&1; then
              echo "[deploy ${STAMP}] build OK; pm2 reload (rolling, zero-downtime)" | tee -a "$LOG"
              pm2 reload atlas-frontend-v2 >> "$LOG" 2>&1
            else
              echo "[deploy ${STAMP}] build FAILED; .next untouched; serving stays old" | tee -a "$LOG"
              exit 1
            fi

            echo "[deploy ${STAMP}] health-check" | tee -a "$LOG"
            sleep 5
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://atlas.jslwealth.in/)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "[deploy ${STAMP}] OK 200 — keeping new build" | tee -a "$LOG"
              # Keep the last 5 .next backups, prune older
              ls -1dt /home/ubuntu/atlas-frontend-v2/.next.bak.* 2>/dev/null | tail -n +6 | xargs -r rm -rf
              exit 0
            else
              echo "[deploy ${STAMP}] FAIL — got HTTP ${HTTP_CODE} — rolling back to .next.bak.${STAMP}" | tee -a "$LOG"
              if [ -d ".next.bak.${STAMP}" ]; then
                rm -rf .next
                mv .next.bak.${STAMP} .next
                pm2 reload atlas-frontend-v2 >> "$LOG" 2>&1
                sleep 5
                HTTP_AFTER=$(curl -sk -o /dev/null -w "%{http_code}" https://atlas.jslwealth.in/)
                echo "[deploy ${STAMP}] after rollback: HTTP ${HTTP_AFTER}" | tee -a "$LOG"
              fi
              exit 2
            fi
