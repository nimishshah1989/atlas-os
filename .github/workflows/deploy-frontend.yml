name: Deploy Frontend

# Trigger only on frontend changes touching the deploy surface.
# Other commits (docs, infra/, atlas/) don't redeploy.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

# Builds + serves from a DEDICATED prod dir, pulling main via git ON the EC2 box.
#
# The previous workflow used the GitHub rsync action (burnett01/rsync-deployments)
# to push source to EC2 — that step had been FAILING since ~2026-06-02 (transport/
# host-key), which silently blocked every deploy before the build even ran (no
# deploy log on the box since then). The box already has SSH git access, so we
# drop the rsync action entirely and do everything in one ssh step: git-pull main
# into a clean source checkout, local-rsync frontend into the serving dir, build,
# pm2-reload, health-check, auto-rollback.
#
# Layout on EC2 (consolidated 2026-06-27 — one frontend process, no stale copies):
#   /home/ubuntu/atlas-prod-src   — clean git checkout of main (deploy source)
#   /home/ubuntu/atlas-os/frontend — serving dir (pm2: atlas-frontend-v3, :3004),
#                                    the SAME process nginx serves at atlas.jslwealth.in.
# .env.local lives in the serving dir and is excluded from the sync. The stale
# atlas-frontend / atlas-frontend-v2 (:3002/:3005) processes were retired.
jobs:
  deploy:
    name: Build + deploy on EC2 (git pull, no rsync action)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Pull main, build, pm2 reload + auto-rollback on health-check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 12m
          script: |
            set -e
            SRC=/home/ubuntu/atlas-prod-src
            # Deploy to the process nginx actually serves (atlas-frontend-v3 / :3004).
            # Previously this targeted atlas-frontend-v2 (:3002), which nginx does NOT serve —
            # so main deploys never reached the live site and it drifted.
            APP=/home/ubuntu/atlas-os/frontend
            STAMP=$(date +%Y%m%d_%H%M%S)
            LOG=/home/ubuntu/logs/deploy_${STAMP}.log
            mkdir -p /home/ubuntu/logs

            echo "[deploy ${STAMP}] sync clean main source" | tee -a "$LOG"
            if [ ! -d "$SRC/.git" ]; then
              git clone git@github.com:nimishshah1989/atlas-os.git "$SRC" >> "$LOG" 2>&1
            fi
            cd "$SRC"
            git fetch origin main >> "$LOG" 2>&1
            git checkout -B deploy-main origin/main >> "$LOG" 2>&1
            git reset --hard origin/main >> "$LOG" 2>&1
            git clean -fd frontend >> "$LOG" 2>&1

            echo "[deploy ${STAMP}] sync frontend → serving dir (local, exact)" | tee -a "$LOG"
            rsync -a --delete \
              --exclude='node_modules' --exclude='.next' --exclude='.next.bak.*' --exclude='.env*' \
              "$SRC"/frontend/ "$APP"/ >> "$LOG" 2>&1

            cd "$APP"
            echo "[deploy ${STAMP}] backing up current .next → .next.bak.${STAMP}" | tee -a "$LOG"
            [ -d .next ] && cp -r .next ".next.bak.${STAMP}"

            # Clear the ISR/fetch cache so the new build prerenders fresh data — without this,
            # Next.js bakes stale ISR pages across rebuilds (the "half and half" / stale-Media bug).
            echo "[deploy ${STAMP}] clearing .next/cache (avoid stale ISR)" | tee -a "$LOG"
            rm -rf .next/cache

            echo "[deploy ${STAMP}] npm ci + build (PM2 still serves the OLD build)" | tee -a "$LOG"
            npm ci --prefer-offline >> "$LOG" 2>&1
            # NEXT_PUBLIC_LENS_V4 is BAKED at build time (feature-flags.ts). Without it the bundle
            # falls back to the pre-v4 nav (the 2026-06-27 "old Atlas glimpses" regression). The
            # serving-dir .env.local also carries it, but set it here too so a fresh box can't drift.
            if NODE_OPTIONS="--max-old-space-size=3072" NEXT_PUBLIC_LENS_V4=1 LENS_V4_ENABLED=1 npm run build >> "$LOG" 2>&1; then
              echo "[deploy ${STAMP}] build OK; pm2 reload (rolling, zero-downtime)" | tee -a "$LOG"
              pm2 reload atlas-frontend-v3 >> "$LOG" 2>&1
            else
              echo "[deploy ${STAMP}] build FAILED; .next untouched; serving stays old" | tee -a "$LOG"
              exit 1
            fi

            echo "[deploy ${STAMP}] health-check (HTTP 200 + v4 nav marker)" | tee -a "$LOG"
            sleep 5
            BODY=$(curl -sk -w "\n%{http_code}" https://atlas.jslwealth.in/)
            HTTP_CODE=$(printf '%s' "$BODY" | tail -n1)
            # Assert the v4 surface actually shipped: the v4 nav has "Sector View"; the pre-v4 nav
            # has "India Pulse". Guards against a flag-less build serving a 200 OLD page (it would
            # otherwise pass and stick). If the marker is missing, treat it as a failed deploy.
            if [ "$HTTP_CODE" = "200" ] && printf '%s' "$BODY" | grep -q "Sector View"; then
              echo "[deploy ${STAMP}] OK 200 + v4 nav — keeping new build" | tee -a "$LOG"
              ls -1dt "$APP"/.next.bak.* 2>/dev/null | tail -n +6 | xargs -r rm -rf
              exit 0
            else
              echo "[deploy ${STAMP}] FAIL — HTTP ${HTTP_CODE} or missing v4 nav — rolling back to .next.bak.${STAMP}" | tee -a "$LOG"
              if [ -d "$APP/.next.bak.${STAMP}" ]; then
                rm -rf "$APP/.next"
                mv "$APP/.next.bak.${STAMP}" "$APP/.next"
                pm2 reload atlas-frontend-v3 >> "$LOG" 2>&1
                sleep 5
                HTTP_AFTER=$(curl -sk -o /dev/null -w "%{http_code}" https://atlas.jslwealth.in/)
                echo "[deploy ${STAMP}] after rollback: HTTP ${HTTP_AFTER}" | tee -a "$LOG"
              fi
              exit 2
            fi
