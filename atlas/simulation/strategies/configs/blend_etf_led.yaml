name: blend_etf_led
tier: blend
archetype: etf_core_satellite
variant: etf_led
description: >
  ETF-led blend: 70% sector ETFs, 30% stocks. Widest state filter (Leader + Strong +
  Emerging) with 25 positions and a 25% sector cap. Uniquely, this strategy holds through
  risk-off markets rather than pausing or scaling. Designed for investors who want
  consistent sector-ETF exposure with a small alpha-seeking stock overlay, accepting
  drawdown in exchange for staying fully invested across market cycles.
state_filter: [leader, strong, emerging]
regime_stance: hold_risk_off
position_sizing: equal_weight
max_positions: 25
max_sector_pct: 25.0
stock_allocation_pct: 30.0
etf_allocation_pct: 70.0
rebalance_trigger: signal_change
threshold_overrides: {}
