name: stocks_momentum_moderate
tier: stocks_only
archetype: momentum_pure
variant: moderate
description: >
  Expands the opportunity set to Leader and Strong-state stocks — the top two relative-strength
  tiers. Runs 20 equal-weight positions with a 35% sector cap. Pauses fully in risk-off regimes.
  Middle ground between aggressive concentration and conservative breadth; broader participation
  without including early-stage momentum names.
state_filter: [leader, strong]
regime_stance: pause_risk_off
position_sizing: equal_weight
max_positions: 20
max_sector_pct: 35.0
rebalance_trigger: signal_change
threshold_overrides: {}
