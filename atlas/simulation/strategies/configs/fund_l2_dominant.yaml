name: fund_l2_dominant
tier: fund_only
archetype: fund_momentum
variant: l2_dominant
description: >
  Large and mid-cap fund strategy — selects from Leader-state funds across the L1
  (large-cap) and L2 (mid-cap) tiers, up to 15 positions. Balances the stability of
  large-cap funds with the growth potential of mid-cap funds. Holds through risk-off.
  Sits between l1_dominant and l3_dominant in both risk and return expectation.
state_filter: [investable]
regime_stance: hold_risk_off
position_sizing: equal_weight
max_positions: 15
max_sector_pct: 100.0
fund_tier_filter: [L1, L2]
rebalance_trigger: signal_change
threshold_overrides: {}
