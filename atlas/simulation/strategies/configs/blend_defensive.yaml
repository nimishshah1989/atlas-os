name: blend_defensive
tier: blend
archetype: etf_core_satellite
variant: defensive
description: >
  ETF-dominant defensive blend: 80% sector ETFs, 20% stocks. Widest state filter
  (Leader + Strong + Emerging) with 30 positions and a 25% sector cap. Scales down in
  risk-off rather than pausing. Lowest volatility of the blend strategies; suited for
  investors who want broad equity exposure with ETF-level diversification as the
  foundation and selective stock positions as satellites.
state_filter: [leader, strong, emerging]
regime_stance: scale_risk_off
position_sizing: equal_weight
max_positions: 30
max_sector_pct: 25.0
stock_allocation_pct: 20.0
etf_allocation_pct: 80.0
rebalance_trigger: signal_change
threshold_overrides: {}
