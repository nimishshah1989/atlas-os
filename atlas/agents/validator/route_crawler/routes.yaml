# Frontend routes to crawl in Phase C.
#
# Each route produces a batch of data-validator-id elements.
# Routes are crawled in order. A failure in one route is isolated
# (per-route try/except in crawl.py) and does not abort the crawl.
#
# path: URL path relative to ATLAS_BASE_URL
# wait_selector: CSS selector whose presence signals the data has loaded
# description: human-readable label for logs and findings

routes:
  # Active — instrumented with data-validator-id
  - path: /etfs
    wait_selector: "[data-validator-id]"
    description: "ETF screener — RS pctile + effort ratio + MA signal"

  - path: /intelligence
    wait_selector: "[data-validator-id]"
    description: "Intelligence page — top conviction stocks + RS pctile"

  # Pending instrumentation (add data-validator-id to components first)
  # - path: /stocks        # StocksScreener not yet instrumented
  # - path: /funds         # FundLens not yet instrumented
  # - path: /regime        # RegimeDashboard not yet instrumented
  # - path: /admin/thresholds  # ThresholdsTable not yet instrumented

  - path: /sectors
    wait_selector: "[data-validator-id]"
    description: "Sector decisions — sector_state + participation + stocks RS"
