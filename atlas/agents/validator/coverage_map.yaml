# Atlas Schema/Coverage expected-coverage map.
# Used by atlas.agents.validator.coverage_loader and schema_scanner (Phase B).
#
# Fields per table:
#   description            — human-readable purpose
#   expected_dates         — "business_days" | "any"
#   expected_instruments_min — minimum unique instruments per date (optional)
#   expected_sectors_min   — minimum unique sectors per date (optional)
#   null_forbidden_columns — columns that must never contain NULL
#   null_allowed_columns   — columns that may contain NULL (informational)
#   coverage_tolerance_pct — minimum coverage % before raising a Finding
#                            (0 = presence not enforced)

tables:
  atlas_stock_states_daily:
    description: Per-stock daily state classifications
    expected_dates: business_days
    expected_instruments_min: 500
    null_forbidden_columns:
      - rs_state
      - momentum_state
      - risk_state
      - volume_state
      - sector
    coverage_tolerance_pct: 99.5

  atlas_sector_states_daily:
    description: Per-sector daily classifications
    expected_dates: business_days
    expected_sectors_min: 13
    null_forbidden_columns:
      - sector_state
    coverage_tolerance_pct: 99.5

  atlas_stock_metrics_daily:
    description: Per-stock daily metrics
    expected_dates: business_days
    expected_instruments_min: 500
    null_allowed_columns:
      - rs_velocity  # only populated for sector metrics
    null_forbidden_columns:
      - close_approx
    coverage_tolerance_pct: 99.0

  atlas_market_regime_daily:
    description: Daily regime classification
    expected_dates: business_days
    null_forbidden_columns:
      - regime_state
      - deployment_multiplier
    coverage_tolerance_pct: 100.0

  atlas_signal_ic:
    description: SP01 IC measurements (sparse — populated on validation runs)
    expected_dates: any
    null_allowed_columns:
      - mean_ic
      - ic_std
      - ic_t_stat
      - ic_ir
      - quantile_spread_ann
      - turnover_monthly
    coverage_tolerance_pct: 0

  atlas_daily_briefs:
    description: SP05 daily briefs
    expected_dates: business_days
    null_forbidden_columns:
      - narrative
      - regime_state
    coverage_tolerance_pct: 95.0
